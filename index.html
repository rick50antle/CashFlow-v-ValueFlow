const playSound = (type, enabled) => {
  if (!enabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(ctx.destination);

    switch (type) {
      case 'success':
        oscillator.frequency.setValueAtTime(523.25, ctx.currentTime);
        oscillator.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
        oscillator.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.4);
        break;
      case 'click':
        oscillator.frequency.setValueAtTime(600, ctx.currentTime);
        gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.08);
        break;
      case 'insight':
        oscillator.frequency.setValueAtTime(440, ctx.currentTime);
        oscillator.frequency.setValueAtTime(554.37, ctx.currentTime + 0.15);
        oscillator.frequency.setValueAtTime(659.25, ctx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.25, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.5);
        break;
      case 'rabbitHole':
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, ctx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
        oscillator.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.3);
        break;
      case 'softNope':
        oscillator.frequency.setValueAtTime(400, ctx.currentTime);
        oscillator.frequency.setValueAtTime(300, ctx.currentTime + 0.12);
        gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.25);
        break;
      case 'buzzer':
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(150, ctx.currentTime);
        gainNode.gain.setValueAtTime(0.25, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.35);
        break;
      default:
        break;
    }
    setTimeout(() => ctx.close(), 600);
  } catch (e) {}
};

const calculateProgress = (currentPartIndex, currentStep) => {
  const totalSteps = PARTS.reduce((sum, p) => sum + p.steps, 0);
  const completedSteps = PARTS.slice(0, currentPartIndex).reduce((sum, p) => sum + p.steps, 0) + currentStep;
  const isLastStep = currentPartIndex === PARTS.length - 1 && currentStep === PARTS[currentPartIndex].steps - 1;
  if (isLastStep) return 100;
  return Math.round((completedSteps / totalSteps) * 100);
};

const formatMoney = (amount) => {
  return '$' + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
};

// Interactive calculation component with three-strike system
const NumericQuestion = ({
  question,
  correctAnswer,
  tolerance = 0.01,
  hints = ['Check your arithmetic.', 'Try again carefully.'],
  prefix = '$',
  suffix = '',
  explanation,
  soundEnabled,
  onCorrect,
}) => {
  const [answer, setAnswer] = useState('');
  const [attempts, setAttempts] = useState(0);
  const [submitted, setSubmitted] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);

  const checkAnswer = () => {
    const numAnswer = parseFloat(answer.replace(/[$,]/g, ''));
    const correct = Math.abs(numAnswer - correctAnswer) <= tolerance;

    if (correct) {
      playSound('success', soundEnabled);
      setIsCorrect(true);
      setSubmitted(true);
      if (onCorrect) onCorrect();
    } else {
      const newAttempts = attempts + 1;
      setAttempts(newAttempts);
      if (newAttempts >= 3) {
        playSound('buzzer', soundEnabled);
        setSubmitted(true);
      } else {
        playSound('softNope', soundEnabled);
      }
    }
  };

  return (
    <div style={{
      background: 'white',
      border: `2px solid ${submitted ? (isCorrect ? COLORS.success : COLORS.warning) : COLORS.border}`,
      borderRadius: '12px',
      padding: '20px',
      marginTop: '16px',
      marginBottom: '16px',
    }}>
      <p style={{ fontSize: '15px', marginBottom: '16px', color: COLORS.textPrimary }}>
        <strong>Your turn:</strong> {question}
      </p>

      <div style={{ display: 'flex', gap: '12px', alignItems: 'center', marginBottom: '12px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
          {prefix && <span style={{ fontSize: '18px', color: COLORS.textSecondary }}>{prefix}</span>}
          <input
            type="text"
            inputMode="decimal"
            value={answer}
            onChange={(e) => setAnswer(e.target.value)}
            disabled={submitted}
            placeholder="?"
            style={{
              width: '100px',
              padding: '10px 12px',
              border: `2px solid ${COLORS.border}`,
              borderRadius: '8px',
              fontSize: '18px',
              fontFamily: 'monospace',
              textAlign: 'center',
            }}
          />
          {suffix && <span style={{ fontSize: '18px', color: COLORS.textSecondary }}>{suffix}</span>}
        </div>

        {!submitted && (
          <button
            onClick={checkAnswer}
            disabled={!answer.trim()}
            style={{
              padding: '10px 20px',
              background: answer.trim() ? COLORS.primary : COLORS.border,
              color: 'white',
              border: 'none',
              borderRadius: '8px',
              fontSize: '15px',
              fontWeight: '500',
              cursor: answer.trim() ? 'pointer' : 'not-allowed',
            }}
          >
            Check
          </button>
        )}
      </div>

      {/* Hints on wrong attempts */}
      {attempts > 0 && attempts < 3 && !submitted && (
        <div style={{
          padding: '12px',
          background: COLORS.warningBg,
          borderRadius: '8px',
          marginTop: '12px',
        }}>
          <p style={{ fontSize: '14px', color: '#92400e', margin: 0 }}>
            <strong>Hint {attempts}/2:</strong> {hints[attempts - 1] || hints[0]}
          </p>
        </div>
      )}

      {/* Success feedback */}
      {submitted && isCorrect && (
        <div style={{
          padding: '12px',
          background: COLORS.successBg,
          borderRadius: '8px',
          marginTop: '12px',
          display: 'flex',
          alignItems: 'center',
          gap: '8px',
        }}>
          <LucideIcon name="CheckCircle" size={18} color={COLORS.success} />
          <p style={{ fontSize: '14px', color: '#166534', margin: 0 }}>
            <strong>Correct!</strong> {explanation || ''}
          </p>
        </div>
      )}

      {/* Third strike - reveal answer */}
      {submitted && !isCorrect && (
        <div style={{
          padding: '12px',
          background: COLORS.warningBg,
          borderRadius: '8px',
          marginTop: '12px',
        }}>
          <p style={{ fontSize: '14px', color: '#92400e', margin: 0 }}>
            <strong>The answer is {prefix}{correctAnswer.toFixed(2)}{suffix}</strong>
            {explanation && <span> — {explanation}</span>}
          </p>
        </div>
      )}
    </div>
  );
};

const AmortizationTable = ({ visibleRows = 6, highlightRow = null }) => {
  const principal = 1000;
  const rate = 0.05;
  const payment = 230.97;

  const rows = [];
  let balance = principal;

  // Row 0 - the loan is made (cash goes OUT, not received)
  rows.push({
    year: 0,
    beginBalance: null,
    cash: null,
    interest: null,
    principalPaid: null,
    endBalance: principal,
  });

  // Years 1-5
  for (let year = 1; year <= 5; year++) {
    const interest = balance * rate;
    const principalPaid = payment - interest;
    const newBalance = balance - principalPaid;
    rows.push({
      year,
      beginBalance: balance,
      cash: payment,
      interest,
      principalPaid,
      endBalance: Math.max(0, newBalance),
    });
    balance = newBalance;
  }

  const displayRows = rows.slice(0, visibleRows);

  return (
    <div style={{
      overflowX: 'auto',
      marginTop: '16px',
      marginBottom: '16px',
    }}>
      <table style={{
        width: '100%',
        borderCollapse: 'collapse',
        fontSize: '14px',
      }}>
        <thead>
          <tr style={{ background: COLORS.primary, color: 'white' }}>
            <th style={{ padding: '12px 8px', textAlign: 'center' }}>Year</th>
            <th style={{ padding: '12px 8px', textAlign: 'right' }}>Beginning<br/>Balance</th>
            <th style={{ padding: '12px 8px', textAlign: 'right' }}>Cash<br/>Received</th>
            <th style={{ padding: '12px 8px', textAlign: 'right' }}>Interest<br/>Earned</th>
            <th style={{ padding: '12px 8px', textAlign: 'right' }}>Principal<br/>Repaid</th>
            <th style={{ padding: '12px 8px', textAlign: 'right' }}>Ending<br/>Balance</th>
          </tr>
        </thead>
        <tbody>
          {displayRows.map((row, idx) => {
            const isHighlighted = highlightRow === row.year;
            return (
              <tr
                key={row.year}
                style={{
                  background: isHighlighted ? COLORS.goldLight : (idx % 2 === 0 ? 'white' : COLORS.surfaceAlt),
                  border: isHighlighted ? `2px solid ${COLORS.goldBorder}` : 'none',
                }}
              >
                <td style={{ padding: '10px 8px', textAlign: 'center', fontWeight: '500' }}>{row.year}</td>
                <td style={{ padding: '10px 8px', textAlign: 'right', fontFamily: 'monospace' }}>{row.beginBalance !== null ? formatMoney(row.beginBalance) : '—'}</td>
                <td style={{ padding: '10px 8px', textAlign: 'right', fontFamily: 'monospace' }}>{row.cash !== null ? formatMoney(row.cash) : '—'}</td>
                <td style={{ padding: '10px 8px', textAlign: 'right', fontFamily: 'monospace' }}>{row.interest !== null ? formatMoney(row.interest) : '—'}</td>
                <td style={{ padding: '10px 8px', textAlign: 'right', fontFamily: 'monospace' }}>{row.principalPaid !== null ? formatMoney(row.principalPaid) : '—'}</td>
                <td style={{ padding: '10px 8px', textAlign: 'right', fontFamily: 'monospace' }}>{formatMoney(row.endBalance)}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
};

      <p style={{ fontSize: '17px', lineHeight: '1.7' }}>
        First, Year 0—when the loan is made:
      </p>
      <AmortizationTable visibleRows={1} highlightRow={0} />
      <p style={{ fontSize: '15px', color: COLORS.textSecondary }}>
        The business paid out $1,000 and now has a loan receivable worth $1,000.
      </p>
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />
    </>,

    // Step 1: Year 1
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>Year 1</h2>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        Beginning balance: <strong>$1,000</strong>
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '8px' }}>
        Interest earned = $1,000 × 5% = <strong>$50.00</strong>
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '8px' }}>
        Cash received = <strong>$230.97</strong>
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '8px' }}>
        Principal repaid = $230.97 − $50.00 = <strong>$180.97</strong>
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        Ending balance = $1,000 − $180.97 = <strong>$819.03</strong>
      </p>
      <AmortizationTable visibleRows={2} highlightRow={1} />
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />
    </>,

    // Step 2: Year 2
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>Year 2</h2>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        Now the balance is only <strong>$819.03</strong>, so interest earned is less:
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '8px' }}>
        Interest earned = $819.03 × 5% = <strong>$40.95</strong>
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '8px' }}>
        Cash received = <strong>$230.97</strong> (same as before)
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '8px' }}>
        Principal repaid = $230.97 − $40.95 = <strong>$190.02</strong>
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        Ending balance = $819.03 − $190.02 = <strong>$629.01</strong>
      </p>
      <AmortizationTable visibleRows={3} highlightRow={2} />
      <InsightBox>
        Notice: Cash received stays the same ($230.97), but interest earned dropped from $50.00 to $40.95.
      </InsightBox>
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />
    </>,

    // Step 3: The pattern
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>The Pattern</h2>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        Let's continue through Year 5:
      </p>
      <AmortizationTable visibleRows={6} />
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginTop: '16px' }}>
        Notice what happens as we move through time:
      </p>
      <ul style={{ fontSize: '17px', lineHeight: '1.8', marginLeft: '20px' }}>
        <li>Cash received: <strong>constant</strong> at $230.97</li>
        <li>Interest earned: <strong>decreasing</strong> each year</li>
        <li>Principal repaid: <strong>increasing</strong> each year</li>
        <li>Ending balance: <strong>shrinking</strong> to zero</li>
      </ul>
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />
    </>,

    // Step 4: The totals
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>The Totals</h2>
      <AmortizationTable visibleRows={6} />
      <div style={{
        background: COLORS.surfaceAlt,
        borderRadius: '12px',
        padding: '20px',
        marginTop: '16px',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '12px' }}>
          <span style={{ fontWeight: '500' }}>Total Cash Received (Years 1-5):</span>
          <span style={{ fontFamily: 'monospace', fontWeight: '600' }}>$1,154.87</span>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '12px' }}>
          <span style={{ fontWeight: '500' }}>Total Interest Earned:</span>
          <span style={{ fontFamily: 'monospace', fontWeight: '600', color: COLORS.gold }}>$154.87</span>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
          <span style={{ fontWeight: '500' }}>Total Principal Returned:</span>
          <span style={{ fontFamily: 'monospace', fontWeight: '600' }}>$1,000.00</span>
        </div>
      </div>
      <p style={{ fontSize: '15px', color: COLORS.textSecondary, marginTop: '12px' }}>
        The totals match what we calculated earlier. The breakdown by year is where the insight lies.
      </p>
      <RabbitHoleButton
        rabbitHole={RABBIT_HOLES.taxImplications}
        explored={exploredRabbitHoles.includes('taxImplications')}
        onClick={() => onRabbitHoleClick('taxImplications')}
        soundEnabled={soundEnabled}
      />
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />
    </>,

    // Step 5: Cash vs Value summary
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>Cash Flow vs Value Flow</h2>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        Let's put them side by side:
      </p>
      <div style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '15px' }}>
          <thead>
            <tr style={{ background: COLORS.primary, color: 'white' }}>
              <th style={{ padding: '12px', textAlign: 'center' }}>Year</th>
              <th style={{ padding: '12px', textAlign: 'right' }}>Cash Received</th>
              <th style={{ padding: '12px', textAlign: 'right' }}>Interest Earned</th>
              <th style={{ padding: '12px', textAlign: 'right' }}>Difference</th>
            </tr>
          </thead>
          <tbody>
            {[
              { year: 1, cash: 230.97, interest: 50.00 },
              { year: 2, cash: 230.97, interest: 40.95 },
              { year: 3, cash: 230.97, interest: 31.45 },
              { year: 4, cash: 230.97, interest: 21.47 },
              { year: 5, cash: 230.97, interest: 11.00 },
            ].map((row, idx) => (
              <tr key={row.year} style={{ background: idx % 2 === 0 ? 'white' : COLORS.surfaceAlt }}>
                <td style={{ padding: '10px', textAlign: 'center', fontWeight: '500' }}>{row.year}</td>
                <td style={{ padding: '10px', textAlign: 'right', fontFamily: 'monospace' }}>{formatMoney(row.cash)}</td>
                <td style={{ padding: '10px', textAlign: 'right', fontFamily: 'monospace', color: COLORS.gold }}>{formatMoney(row.interest)}</td>
                <td style={{ padding: '10px', textAlign: 'right', fontFamily: 'monospace', color: COLORS.textSecondary }}>{formatMoney(row.cash - row.interest)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <InsightBox>
        <strong>Cash flow is constant. Value flow is not.</strong><br/><br/>
        The difference—principal repayment—is return OF capital, not return ON capital.
      </InsightBox>
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />
    </>,
  ];

  return content[step] || null;
};

// --- Part 4: The Insight ---
const InsightPart = ({ step, onContinue, soundEnabled }) => {
  const content = [
    // Step 0: Why it matters
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>Why This Matters</h2>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        We just demonstrated that <strong>cash received ≠ income earned</strong>.
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        This matters for:
      </p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginTop: '16px' }}>
        <div style={{ padding: '16px', background: COLORS.surfaceAlt, borderRadius: '10px', borderLeft: `4px solid ${COLORS.primary}` }}>
          <strong>Accounting:</strong> Revenue recognition isn't just "record cash when received."
        </div>
        <div style={{ padding: '16px', background: COLORS.surfaceAlt, borderRadius: '10px', borderLeft: `4px solid ${COLORS.primary}` }}>
          <strong>Valuation:</strong> The loan asset's value declines each year as principal is repaid.
        </div>
        <div style={{ padding: '16px', background: COLORS.surfaceAlt, borderRadius: '10px', borderLeft: `4px solid ${COLORS.primary}` }}>
          <strong>Performance measurement:</strong> "How much did we make this year?" requires separating cash from value.
        </div>
      </div>
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />
    </>,

    // Step 1: The clean case
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>The Clean Case</h2>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        With the loan, we could calculate <em>exactly</em> how much value was created each period.
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        The math was unambiguous:
      </p>
      <div style={{
        background: COLORS.successBg,
        border: `2px solid ${COLORS.successBorder}`,
        borderRadius: '12px',
        padding: '20px',
        marginTop: '16px',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
          <LucideIcon name="CheckCircle" size={24} color={COLORS.success} />
          <div>
            <div style={{ fontWeight: '600', marginBottom: '4px' }}>Interest Earned = Beginning Balance × Interest Rate</div>
            <div style={{ fontSize: '14px', color: COLORS.textSecondary }}>No judgment required. Pure calculation.</div>
          </div>
        </div>
      </div>
      <div style={{
        background: COLORS.goldLight,
        border: `3px solid ${COLORS.goldBorder}`,
        borderRadius: '12px',
        padding: '24px',
        marginTop: '24px',
        textAlign: 'center',
      }}>
        <p style={{ fontSize: '19px', lineHeight: '1.7', margin: 0, fontWeight: '600', color: COLORS.textPrimary }}>
          But what happens when value creation isn't so cleanly defined?
        </p>
      </div>
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />
    </>,

    // Step 2: Transition - connect to other businesses
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>Beyond Loans</h2>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        The loan example was special. We had:
      </p>
      <ul style={{ fontSize: '17px', lineHeight: '1.8', marginLeft: '20px', marginBottom: '16px' }}>
        <li>A clear starting asset ($1,000 loan receivable)</li>
        <li>A known interest rate (5%)</li>
        <li>An unambiguous formula for value creation</li>
      </ul>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        Think back to the other businesses we've studied: <strong>RetailBiz</strong>, <strong>Rick and Stan's Business</strong>, <strong>Miloslav, Ofer and Raphy's Business</strong>.
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        When we recorded revenue and expenses in those businesses, we were using <em>intuition</em> about when value was created. But was that intuition correct?
      </p>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        Consider a manufacturing company...
      </p>
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} label="Let's explore" />
    </>,
  ];

  return content[step] || null;
};

// --- Part 5: The Extension ---
const ExtensionPart = ({ step, onContinue, soundEnabled }) => {
  const content = [
    // Step 0: Manufacturing setup
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>Now Consider: Manufacturing</h2>

      </p>
      <div style={{
        background: COLORS.surfaceAlt,
        borderRadius: '12px',
        padding: '24px',

          </div>
          <div>
            <div style={{ fontSize: '28px', fontWeight: '700', color: COLORS.gold }}>$20</div>
            <div style={{ fontSize: '14px', color: COLORS.textSecondary, marginTop: '4px' }}>Profit</div>

        </div>
      </div>
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />

    <>

        <p style={{ fontSize: '15px', color: COLORS.textSecondary, marginLeft: '20px', marginBottom: '16px' }}>
          After all, nothing is certain until a buyer pays.

        <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '12px' }}>
          <strong>Option C:</strong> Something in between?
        </p>
      </div>
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />
    </>,

    // Step 2: More questions
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>More Questions</h2>
      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '16px' }}>
        What if the widget sits in inventory for a year before you sell it?

      <p style={{ fontSize: '17px', lineHeight: '1.7', marginBottom: '20px' }}>

      <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
        <div style={{ padding: '16px', background: COLORS.surfaceAlt, borderRadius: '10px' }}>
          Is it worth <strong>$80</strong>? (what you spent)
        </div>
        <div style={{ padding: '16px', background: COLORS.surfaceAlt, borderRadius: '10px' }}>
          Is it worth <strong>$100</strong>? (what you expect to sell it for)
        </div>
        <div style={{ padding: '16px', background: COLORS.surfaceAlt, borderRadius: '10px' }}>
          Something <strong>in between</strong>?
        </div>
      </div>
      <ContinueButton onClick={onContinue} soundEnabled={soundEnabled} />
    </>,

    // Step 3: The difference
    <>
      <h2 style={{ color: COLORS.primary, marginBottom: '16px' }}>The Key Difference</h2>
      <div style={{ display: 'flex', gap: '16px', marginTop: '20px', flexWrap: 'wrap' }}>
        <div style={{
          flex: 1,
          minWidth: '250px',
          padding: '20px',
          background: COLORS.successBg,
          borderRadius: '12px',
          border: `2px solid ${COLORS.successBorder}`,
        }}>
          <h3 style={{ color: COLORS.success, marginBottom: '12px', fontSize: '16px' }}>With the Loan</h3>
          <p style={{ fontSize: '15px', lineHeight: '1.6', margin: 0 }}>
            Cash flow ≠ Value flow<br/><br/>
            <strong>But we can calculate value flow precisely.</strong>
          </p>
        </div>
        <div style={{
          flex: 1,
          minWidth: '250px',
          padding: '20px',
          background: COLORS.warningBg,

          <h3 style={{ color: COLORS.warning, marginBottom: '12px', fontSize: '16px' }}>With Manufacturing</h3>

  return content[step] || null;

// ============================================================================
// MAIN APP
// ============================================================================

const App = () => {
  const [currentPartIndex, setCurrentPartIndex] = useState(0);
  const [currentStep, setCurrentStep] = useState(0);
  const [showGlossary, setShowGlossary] = useState(false);
  const [showRabbitHoleList, setShowRabbitHoleList] = useState(false);
  const [activeRabbitHole, setActiveRabbitHole] = useState(null);
  const [exploredRabbitHoles, setExploredRabbitHoles] = useState([]);
  const [soundEnabled, setSoundEnabled] = useState(true);
  const [devMode, setDevMode] = useState(false);
  const [headerClickCount, setHeaderClickCount] = useState(0);
  const [lastClickTime, setLastClickTime] = useState(0);

  const handleContinue = useCallback(() => {
    const currentPart = PARTS[currentPartIndex];
    if (currentStep < currentPart.steps - 1) {
      setCurrentStep(currentStep + 1);
    } else if (currentPartIndex < PARTS.length - 1) {
      setCurrentPartIndex(currentPartIndex + 1);
      setCurrentStep(0);
      playSound('success', soundEnabled);
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [currentPartIndex, currentStep, soundEnabled]);

  const handleRestart = useCallback(() => {
    setCurrentPartIndex(0);
    setCurrentStep(0);
    setExploredRabbitHoles([]);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const handleRabbitHoleClick = useCallback((id) => {
    const rabbitHole = RABBIT_HOLES[id];
    setActiveRabbitHole(rabbitHole);
    if (!exploredRabbitHoles.includes(id)) {
      setExploredRabbitHoles(prev => [...prev, id]);
    }
  }, [exploredRabbitHoles]);

  const handleRabbitHoleFromList = useCallback((rabbitHole) => {
    setShowRabbitHoleList(false);
    setActiveRabbitHole(rabbitHole);
    if (!exploredRabbitHoles.includes(rabbitHole.id)) {
      setExploredRabbitHoles(prev => [...prev, rabbitHole.id]);
    }
  }, [exploredRabbitHoles]);

  const handleHeaderClick = useCallback(() => {
    const now = Date.now();
    if (now - lastClickTime < 500) {
      const newCount = headerClickCount + 1;
      setHeaderClickCount(newCount);
      if (newCount >= 3) {
        setDevMode(prev => !prev);
        setHeaderClickCount(0);
      }
    } else {
      setHeaderClickCount(1);
    }
    setLastClickTime(now);
  }, [headerClickCount, lastClickTime]);

  const handleJumpToPart = useCallback((partIndex) => {
    setCurrentPartIndex(partIndex);
    setCurrentStep(0);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const renderContent = () => {
    const currentPart = PARTS[currentPartIndex];
    const props = {
      step: currentStep,
      onContinue: handleContinue,
      soundEnabled,
      onRabbitHoleClick: handleRabbitHoleClick,
      exploredRabbitHoles,
    };

    switch (currentPart.id) {
      case 'setup': return <SetupPart {...props} />;
      case 'payment': return <PaymentPart {...props} />;
      case 'amortization': return <AmortizationPart {...props} />;
      case 'insight': return <InsightPart {...props} />;
      case 'extension': return <ExtensionPart {...props} />;
      default: return null;
    }
  };

  return (
    <div style={{ minHeight: '100vh', background: COLORS.background }}>
      <Header
        currentPartIndex={currentPartIndex}
        currentStep={currentStep}
        onGlossaryClick={() => setShowGlossary(true)}
        onRestartClick={handleRestart}
        onHeaderClick={handleHeaderClick}
        soundEnabled={soundEnabled}
        onSoundToggle={() => setSoundEnabled(!soundEnabled)}
        exploredRabbitHoles={exploredRabbitHoles}
        onRabbitHoleListClick={() => setShowRabbitHoleList(true)}
      />

      <main style={{
        maxWidth: '800px',
        margin: '0 auto',
        padding: '32px 24px',
      }}>
        <div style={{
          background: 'white',
          borderRadius: '16px',
          padding: '32px',
          boxShadow: '0 4px 20px rgba(0,0,0,0.08)',
        }}>
          {renderContent()}
        </div>

        <div style={{
          marginTop: '24px',
          padding: '16px',
          background: COLORS.surfaceAlt,
          borderRadius: '10px',
          display: 'flex',
          justifyContent: 'center',
          gap: '8px',
          flexWrap: 'wrap',
        }}>
          {PARTS.map((part, index) => (
            <div
              key={part.id}
              style={{
                padding: '8px 16px',
                borderRadius: '20px',
                fontSize: '13px',
                fontWeight: '500',
                background: index === currentPartIndex ? COLORS.primary : 'white',
                color: index === currentPartIndex ? 'white' : (index < currentPartIndex ? COLORS.success : COLORS.textMuted),
                border: `1px solid ${index === currentPartIndex ? COLORS.primary : COLORS.border}`,
              }}
            >
              {index < currentPartIndex && <span style={{ marginRight: '4px' }}>✓</span>}
              {part.title}
            </div>
          ))}
        </div>
      </main>

      {showGlossary && <GlossaryModal onClose={() => setShowGlossary(false)} />}
      {showRabbitHoleList && (
        <RabbitHoleListModal
          exploredRabbitHoles={exploredRabbitHoles}
          onSelectRabbitHole={handleRabbitHoleFromList}
          onClose={() => setShowRabbitHoleList(false)}
        />
      )}
      {activeRabbitHole && (
        <RabbitHoleModal
          rabbitHole={activeRabbitHole}
          onClose={() => setActiveRabbitHole(null)}
        />
      )}
      {devMode && (
        <DevModePanel
          onJumpToPart={handleJumpToPart}
          currentPartIndex={currentPartIndex}
          onClose={() => setDevMode(false)}
        />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
